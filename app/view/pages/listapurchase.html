{% extends "layouts/main.html" %}
{% block title %}Compras{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center gap-2">
            <i class="fa-solid fa-receipt fa-lg text-success"></i>
            <h4 class="mb-0 fw-semibold">Compras</h4>
        </div>
        <button class="btn btn-success px-4"
            onclick="api.window.open('pages/purchase', { width: 800, height: 600, title: 'Cadastrar Compra' })">
            <i class="fa-solid fa-plus me-2"></i>Novo Compra
        </button>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-3">
            <table id="table-purchases" class="table table-striped table-hover table-bordered align-middle mb-0" style="width: 100%;">
                <thead class="table-dark">
                    <tr>
                        <th class="text-center" style="width: 60px;">#</th>
                        <th><i class="fa-solid fa-user me-1"></i>Total Bruto</th>
                        <th><i class="fa-solid fa-id-card me-1"></i>Total Liquido</th>
                        <th><i class="fa-solid fa-fingerprint me-1"></i>Desconto</th>
                        <th class="text-center" style="width: 100px;">Acrescimo</th>
                        <th class="text-center" style="width: 100px;">Observação</th>
                        <th class="text-center" style="width: 180px;">Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script defer type="module" src="file:///{{ assets }}/js/listapurchase.js"></script>
{% endblock %}
