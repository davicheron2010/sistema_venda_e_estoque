{% extends "layouts/main.html" %}
{% block title %}Produto{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center gap-2">
            <i class="fa-solid fa-box me-1 fa-lg text-success"></i>
            <h4 class="mb-0 fw-semibold">Produto</h4>
        </div>
        <button class="btn btn-success px-4"
            onclick="api.window.open('pages/product', { width: 800, height: 600, title: 'Cadastrar Produto' })">
            <i class="fa-solid fa-plus me-2"></i>Novo Produto
        </button>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-3">
            <table id="table-product" class="table table-striped table-hover table-bordered align-middle mb-0" style="width: 100%;">
                <thead class="table-dark">
                    <tr>
                        <th class="text-center" style="width: 60px;">#</th>
                        <th><i class="fa-solid fa-tag me-1"></i>nome</th>
                        <th><i class="fa-solid fa-barcode me-1"></i>codigo_barra</th>
                        <th><i class="fa-solid fa-ruler me-1"></i>unidade</th>
                        <th><i class="fa-solid fa-cart-shopping me-1"></i>preco_compra</th>
                        <th><i class="fa-solid fa-percent me-1"></i>total_imposto</th>
                        <th><i class="fa-solid fa-chart-line me-1"></i>margem_lucro</th>
                        <th><i class="fa-solid fa-screwdriver-wrench me-1"></i>custo_operacional</th>
                        <th><i class="fa-solid fa-hand-holding-dollar me-1"></i>valor_venda_sugerido</th>
                        <th><i class="fa-solid fa-dollar-sign me-1"></i>preco_venda</th>
                        <th><i class="fa-solid fa-align-left me-1"></i>descricao</th>
                        <th class="text-center" style="width: 100px;">Status</th>
                        <th class="text-center" style="width: 180px;">Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="file:///{{ assets }}/js/listaproduct.js"></script>
{% endblock %}
