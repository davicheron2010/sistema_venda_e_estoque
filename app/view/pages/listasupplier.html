{% extends "layouts/main.html" %}
{% block title %}Fornecedor{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center gap-2">
             <i class="fa-solid fa-truck fa-lg text-success"></i>
            <h4 class="mb-0 fw-semibold">Fornecedor</h4>
        </div>
        <button class="btn btn-success px-4"
            onclick="api.window.open('pages/supplier', { width: 800, height: 600, title: 'Cadastrar Fornecedor' })">
            <i class="fa-solid fa-plus me-2"></i>Novo Fornecedor
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-3">
            <table id="table-supplier" class="table table-striped table-hover table-bordered align-middle mb-0" style="width: 100%;">
                <thead class="table-dark">
                    <tr>
                        <th class="text-center" style="width: 60px;">#</th>
                        <th><i class="fa-solid fa-building me-1"></i>NOME_FANTASIA</th>
                        <th><i class="fa-solid fa-file-signature me-1"></i>RAZAO_SOCIAL</th>
                        <th><i class="fa-solid fa-id-card me-1"></i>CNPJ_CPF</th>
                        <th><i class="fa-solid fa-address-card me-1"></i>IE_RG</th>
                        <th class="text-center" style="width: 100px;">Status</th>
                        <th class="text-center" style="width: 180px;">Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="file:///{{ assets }}/js/listasupplier.js"></script>
{% endblock %}
